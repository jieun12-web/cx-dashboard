name: publish-dashboard

# 시트 → docs/data.json 갱신 → 커밋 → GitHub Pages 자동 배포.
# chat 수집(23:30) 다음에 돌도록 23:45 KST. 사이트·빌더 코드 푸시 시에도 갱신.
on:
  schedule:
    - cron: '45 14 * * *'        # UTC 14:45 = KST 23:45
  workflow_dispatch: {}
  push:
    branches: [main]
    paths:
      - 'build_data.py'
      - 'config.py'
      - 'sheets.py'
      - 'google_credentials.py'
      - 'transform.py'
      - 'docs/index.html'
      - 'docs/app.js'
      - 'docs/style.css'

concurrency:
  group: publish-dashboard
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies (sheet only — playwright 불필요)
        run: pip install requests==2.32.3 google-auth==2.35.0 google-api-python-client==2.149.0

      - name: Build data.json
        env:
          GOOGLE_OAUTH_CLIENT_ID: ${{ secrets.GOOGLE_OAUTH_CLIENT_ID }}
          GOOGLE_OAUTH_CLIENT_SECRET: ${{ secrets.GOOGLE_OAUTH_CLIENT_SECRET }}
          GOOGLE_OAUTH_REFRESH_TOKEN: ${{ secrets.GOOGLE_OAUTH_REFRESH_TOKEN }}
        run: python build_data.py

      - name: Commit data.json if changed
        run: |
          if [ -n "$(git status --porcelain docs/data.json)" ]; then
            git config user.name "dashboard-publisher"
            git config user.email "noreply@github.com"
            git add docs/data.json
            git commit -m "chore: data.json 갱신 [skip ci]"
            git push origin HEAD:main
          else
            echo "data.json 변경 없음"
          fi
