name: collect-call

# 콜라비(전화) 통계 → 'CX 대시보드 데이터' 시트 적재. 매일 1회.
# 채팅(collect-chat) 30분 전에 돌려서 같은 시트에 동시 쓰기 회피.
on:
  schedule:
    - cron: '0 14 * * *'        # UTC 14:00 = KST 23:00
  workflow_dispatch: {}

concurrency:
  group: collect-call
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install Playwright browser
        run: python -m playwright install --with-deps chromium

      - name: Reachability check (콜라비 접속 가능성)
        run: |
          echo "== DNS =="
          getent hosts callrabi.ishopcare.co.kr || echo "DNS fail"
          echo "== TCP 8070 =="
          timeout 10 bash -c '</dev/tcp/callrabi.ishopcare.co.kr/8070' \
            && echo "TCP OK" || echo "TCP fail (방화벽/IP제한 의심)"
          echo "== HTTP =="
          curl -sk --max-time 15 -o /dev/null -w "code=%{http_code} time=%{time_total}s\n" \
            https://callrabi.ishopcare.co.kr:8070/ || echo "HTTP fail"

      - name: Collect call data
        env:
          COLABEE_USERNAME: ${{ secrets.COLABEE_USERNAME }}
          COLABEE_PASSWORD: ${{ secrets.COLABEE_PASSWORD }}
          GOOGLE_OAUTH_CLIENT_ID: ${{ secrets.GOOGLE_OAUTH_CLIENT_ID }}
          GOOGLE_OAUTH_CLIENT_SECRET: ${{ secrets.GOOGLE_OAUTH_CLIENT_SECRET }}
          GOOGLE_OAUTH_REFRESH_TOKEN: ${{ secrets.GOOGLE_OAUTH_REFRESH_TOKEN }}
        run: python collect_call.py
